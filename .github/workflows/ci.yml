name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    name: Validate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - macos-15-intel
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Typecheck
        run: bun run typecheck

      - name: Check formatting and lint
        run: bun run check

      - name: Build
        run: bun run build

      - name: Validate MCP bundle syntax
        run: node --check dist/mcp/index.js

      - name: Package
        run: bun run package

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: atlas-browser-connect-${{ runner.os }}-${{ runner.arch }}
          path: |
            release/*.zip
            release/*.tar.gz
          if-no-files-found: error
