name: Publish Package

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - run: bun install --frozen-lockfile

      - run: bun test

      - run: bun run typecheck

      - run: bun run check

      - run: bun run build

      - run: node --check dist/cli/index.js

      - run: node --check dist/mcp/index.js

      - run: node --check dist/native-messaging-host/index.js

      - run: bun run package:check

      - run: npm publish --access public
